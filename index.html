<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SteadyTenant – Maintenance Portal for Small Landlords</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; border-bottom: 1px solid #1e1e1e; }
    .logo { font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .logo span { color: #6ee7b7; }
    nav a { color: #aaa; text-decoration: none; margin-left: 30px; font-size: 0.9rem; transition: color 0.2s; }
    nav a:hover { color: #fff; }
    .hero { text-align: center; padding: 120px 20px 80px; max-width: 780px; margin: 0 auto; }
    .badge { display: inline-block; background: #1a1a1a; border: 1px solid #2e2e2e; color: #6ee7b7; font-size: 0.75rem; padding: 6px 14px; border-radius: 20px; margin-bottom: 24px; letter-spacing: 0.5px; }
    h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.15; margin-bottom: 24px; letter-spacing: -1px; }
    h1 span { color: #6ee7b7; }
    .subtitle { font-size: 1.15rem; color: #888; line-height: 1.7; margin-bottom: 40px; }
    .cta-group { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: #6ee7b7; color: #0f0f0f; padding: 14px 28px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: transparent; color: #f0f0f0; padding: 14px 28px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; text-decoration: none; border: 1px solid #2e2e2e; transition: border-color 0.2s; }
    .btn-secondary:hover { border-color: #6ee7b7; }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 900px; margin: 80px auto; padding: 0 30px; }
    .card { background: #141414; border: 1px solid #1e1e1e; border-radius: 12px; padding: 28px; transition: border-color 0.2s; }
    .card:hover { border-color: #6ee7b7; }
    .card-icon { font-size: 1.6rem; margin-bottom: 14px; }
    .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .card p { font-size: 0.875rem; color: #666; line-height: 1.6; }
    .social-proof { text-align: center; padding: 60px 20px; border-top: 1px solid #1a1a1a; color: #444; font-size: 0.85rem; letter-spacing: 0.5px; }
    .footer { text-align: center; padding: 30px; font-size: 0.8rem; color: #333; border-top: 1px solid #1a1a1a; }
  </style>
</head>

    </div>
  </nav>
