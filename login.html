<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SteadyTenant – Landlord Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      border-bottom: 1px solid #1e1e1e;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .logo span { color: #6ee7b7; }

    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .login-card h1 span { color: #6ee7b7; }

    .login-card p {
      color: #555;
      font-size: 0.85rem;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      padding: 12px 16px;
      font-family: 'Segoe UI', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: #6ee7b7; }

    .btn-login {
      width: 100%;
      background: #6ee7b7;
      color: #0f0f0f;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover { opacity: 0.85; }

    .error-msg {
      display: none;
      background: #1f0d0d;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-top: 16px;
      text-align: center;
    }

    .loading {
      display: none;
      text-align: center;
      color: #555;
      font-size: 0.85rem;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Steady<span>Tenant</span></a>
  </nav>

  <div class="center">
    <div class="login-card">
      <h1>Landlord <span>Login</span></h1>
      <p>Sign in to access your maintenance dashboard.</p>

      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn-login" onclick="login()">Sign In →</button>

      <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>
      <div class="loading" id="loadingMsg">Signing in...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://akjcoiowygvewzarryaj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFramNvaW93eWd2ZXd6YXJyeWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTcyNTIsImV4cCI6MjA5MjkzMzI1Mn0.KMiq0h8RJlihPipotG6jOpjMUAtvyXxJla94aUmyFfg';

    // If already logged in, go straight to dashboard
    const session = localStorage.getItem('sb_session');
    if (session) {
      window.location.href = 'dashboard.html';
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showError();
        return;
      }

      document.getElementById('loadingMsg').style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';

      const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();
      document.getElementById('loadingMsg').style.display = 'none';

      if (data.access_token) {
        localStorage.setItem('sb_session', data.access_token);
        window.location.href = 'dashboard.html';
      } else {
        showError();
      }
    }

    function showError() {
      document.getElementById('errorMsg').style.display = 'block';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>

</body>
</html>
